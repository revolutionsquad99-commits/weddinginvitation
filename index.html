<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>


<!-- THUMBNAIL WA -->

<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">

<meta property="og:description"
content="Kami mengundang Anda untuk hadir pada hari bahagia kami">

<meta property="og:image"
content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">

<meta property="og:image:type" content="image/png">

<meta property="og:image:width" content="1200">

<meta property="og:image:height" content="630">

<meta property="og:url"
content="https://alya-wahyu-wedding.github.io/wedding-invitation/">

<meta property="og:type" content="website">



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


html{
scroll-behavior:smooth;
}


body{

background:#f5f5f5;
overflow-x:hidden;
font-family:Georgia,serif;

}


/* COVER */

#cover{

position:relative;
width:100%;
max-width:700px;
margin:auto;

}


.cover-img{

width:100%;
display:block;

}


/* AREA KLIK COVER */


.btn-buka{

position:absolute;

left:22%;
bottom:19%;

width:18%;
height:6%;

cursor:pointer;

}



.btn-peta{

position:absolute;

right:22%;
bottom:19%;

width:18%;
height:6%;

cursor:pointer;

}



/* ISI */


#content{

display:none;

max-width:700px;
margin:auto;

background:white;

animation:fade .8s;

}



.page{

width:100%;
height:auto;

display:block;

}



@keyframes fade{

from{
opacity:0;
}

to{
opacity:1;
}

}




/* FLOAT BUTTON */


.floating{

position:fixed;

right:15px;
bottom:15px;

display:none;

flex-direction:column;

gap:10px;

z-index:9999;

}



.float-btn{

width:70px;
height:70px;

border:none;

border-radius:50%;

font-size:13px;

font-weight:bold;

cursor:pointer;

}



.home{

background:#6d0015;
color:white;

}



.peta{

background:#d4af37;
color:white;

}



/* =====================
   BUTTERFLY REAL MOTION
===================== */


.butterfly{
position:fixed;
z-index:9998;
pointer-events:none;

transform-origin:center;

animation-timing-function:linear;
animation-iteration-count:infinite;
}



/* GERAK SAYAP */

.butterfly{
animation-name:fly;
}


.butterfly::after{
content:"";
}



.bf1{
width:65px;
left:-100px;
top:70%;

animation:
fly1 14s linear infinite,
flap .35s ease-in-out infinite alternate;
}



.bf2{
width:110px;
right:-120px;
top:25%;

animation:
fly2 20s linear infinite,
flap .4s ease-in-out infinite alternate;

animation-delay:2s;
}



.bf3{
width:160px;
left:-150px;
top:15%;

animation:
fly3 26s linear infinite,
flap .5s ease-in-out infinite alternate;

animation-delay:5s;
}



/* KEPAKAN */

@keyframes flap{


from{

transform:
scaleX(1)
rotate(-5deg);

}



to{

transform:
scaleX(.75)
rotate(5deg);

}

}



/* JALUR TERBANG */


@keyframes fly1{


0%{
translate:0 0;
opacity:0;
}


10%{
opacity:1;
}


50%{
translate:55vw -30vh;
}


100%{
translate:120vw -5vh;
opacity:0;
}

}



@keyframes fly2{


0%{
translate:0 0;
opacity:0;
}


10%{
opacity:1;
}


50%{
translate:-50vw 25vh;
}


100%{
translate:-120vw -20vh;
opacity:0;
}

}



@keyframes fly3{


0%{
translate:0 0;
opacity:0;
}


10%{
opacity:1;
}


50%{
translate:60vw 40vh;
}


100%{
translate:130vw 10vh;
opacity:0;
}

}


<!-- KUPU KUPU -->

<img src="butterfly1.png" class="butterfly bf1">

<img src="butterfly2.png" class="butterfly bf2">

<img src="butterfly3.png" class="butterfly bf3">





<!-- MUSIK -->


<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>





<!-- COVER -->


<div id="cover">


<img src="cover.jpg" class="cover-img">



<div
class="btn-buka"
onclick="bukaUndangan()">

</div>




<a
class="btn-peta"

href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"

target="_blank">

</a>



</div>






<!-- UNDANGAN -->


<div id="content">


<img src="halaman1.jpg" class="page">

<img src="halaman2.jpg" class="page">

<img src="halaman3.jpg" class="page">

<img src="halaman4.jpg" class="page">

<img src="halaman5.jpg" class="page">

<img src="halaman6.jpg" class="page">



</div>







<!-- BUTTON -->

<div class="floating">



<button

class="float-btn peta"

onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">

PETA

</button>



<button

class="float-btn home"

onclick="kembaliHome()">

HOME

</button>



</div>








<script>



const musik =
document.getElementById("musik");





function bukaUndangan(){


document.getElementById("cover").style.display="none";


document.getElementById("content").style.display="block";


document.querySelector(".floating").style.display="flex";



musik.play().catch(()=>{});



window.scrollTo({

top:0,

behavior:"smooth"

});

}





function kembaliHome(){


document.getElementById("content").style.display="none";


document.getElementById("cover").style.display="block";


document.querySelector(".floating").style.display="none";



window.scrollTo({

top:0,

behavior:"smooth"

});

}



</script>



</body>

</html>
