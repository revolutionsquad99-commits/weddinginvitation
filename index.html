<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>


<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">
<meta property="og:image" content="thumbnail.png">
<meta property="og:type" content="website">



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



body{

background:#f5f5f5;
overflow:hidden;
font-family:Georgia,serif;

}



/* COVER */


#cover{

position:relative;

width:100%;

max-width:700px;

margin:auto;

}



.cover-img{

width:100%;

display:block;

}




.btn-buka{

position:absolute;

left:22%;

bottom:19%;

width:18%;

height:6%;

cursor:pointer;

}



.btn-peta{

position:absolute;

right:22%;

bottom:19%;

width:18%;

height:6%;

}






/* ALBUM */


#content{

display:none;

width:100%;

height:100vh;

overflow-x:auto;

overflow-y:hidden;

scroll-snap-type:x mandatory;

background:white;

}



.book{

display:flex;

height:100vh;

}



.page{

height:100vh;

width:100vw;

max-width:700px;

flex-shrink:0;

scroll-snap-align:center;

}



.page img{

width:100%;

height:100vh;

object-fit:contain;

display:block;

}






/* FLOAT */


.floating{

position:fixed;

right:15px;

bottom:20px;

display:none;

flex-direction:column;

gap:10px;

z-index:9999;

}



.float-btn{

width:65px;

height:65px;

border:none;

border-radius:50%;

font-weight:bold;

}



.home{

background:#6d0015;

color:white;

}



.peta{

background:#d4afgold;

color:white;

}



</style>


</head>




<body>




<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>






<!-- COVER -->


<div id="cover">


<img src="cover.jpg" class="cover-img">



<div class="btn-buka"

onclick="buka()">

</div>



<a class="btn-peta"

href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"

target="_blank">

</a>



</div>








<!-- ISI -->


<div id="content">


<div class="book">



<div class="page">

<img src="halaman1.jpg">

</div>



<div class="page">

<img src="halaman2.jpg">

</div>



<div class="page">

<img src="halaman3.jpg">

</div>



<div class="page">

<img src="halaman4.jpg">

</div>



<div class="page">

<img src="halaman5.jpg">

</div>



<div class="page">

<img src="halaman6.jpg">

</div>



</div>


</div>








<!-- BUTTON -->

<div class="floating">



<button class="float-btn peta"

onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">

PETA

</button>




<button class="float-btn home"

onclick="home()">

HOME

</button>



</div>







<script>



const musik =
document.getElementById("musik");




function buka(){


document.getElementById("cover").style.display="none";


document.getElementById("content").style.display="block";


document.querySelector(".floating").style.display="flex";



musik.play().catch(()=>{});



}






function home(){


document.getElementById("content").style.display="none";


document.getElementById("cover").style.display="block";


document.querySelector(".floating").style.display="none";



}






// PC SCROLL JADI SLIDE


const album =
document.getElementById("content");



album.addEventListener("wheel",function(e){


e.preventDefault();


album.scrollLeft += e.deltaY;



},{passive:false});




</script>






</body>

</html>
