<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:sans-serif;
background:#000;
}

/* COVER */
#cover{
width:100%;
height:100vh;
background:#5a1a1a; /* MAROON */
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

#cover h1{
font-size:28px;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
margin:10px;
font-size:16px;
cursor:pointer;
}

/* SECTION FOTO */
.section img{
width:100%;
height:100vh;
object-fit:cover;
display:block;
}

/* BUTTON FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
z-index:999;
}

</style>
</head>

<body onclick="startMusic()">

<!-- MUSIK -->
<audio id="music" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- COVER -->
<div id="cover">
<h1>Undangan Pernikahan Alya & Wahyu</h1>

<button onclick="openInvitation()">
Buka Undangan
</button>

<button onclick="openMap()">
Peta Lokasi Resepsi
</button>
</div>

<!-- ISI UNDANGAN -->
<div id="content">

<img src="halaman1.jpg">
<img src="halaman2.jpg">
<img src="halaman3.jpg">
<img src="halaman4.jpg">
<img src="halaman5.jpg">
<img src="halaman6.jpg">

</div>

<script>

const music = document.getElementById("music");
let started = false;

function startMusic(){
if(!started){
music.play();
started = true;
}
}

function openInvitation(){
document.getElementById("cover").style.display="none";
document.getElementById("content").scrollIntoView();
startMusic();
}

function openMap(){
window.open("https://www.google.com/maps?q=Royal+Ambarrukmo+Yogyakarta");
}

</script>

</body>
</html>
