<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>


<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">

<meta property="og:image" content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">

<meta property="og:type" content="website">



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



body{

background:#f5f5f5;
overflow:hidden;
font-family:Georgia,serif;

}



/* COVER */


#cover{

position:relative;

width:100%;

max-width:700px;

margin:auto;

}



.cover-img{

width:100%;

display:block;

}



.btn-buka{

position:absolute;

left:22%;

bottom:19%;

width:18%;

height:6%;

cursor:pointer;

}



.btn-peta{

position:absolute;

right:22%;

bottom:19%;

width:18%;

height:6%;

cursor:pointer;

}





/* ISI */

#content{

display:none;

width:100%;

max-width:700px;

margin:auto;

overflow:hidden;

background:white;

}



.book{

display:flex;

width:100%;

transition:transform .55s ease;

}



.page{

flex:0 0 100%;

width:100%;

}



.page img{

width:100%;

display:block;

}







/* FLOAT BUTTON */


.floating{

position:fixed;

right:15px;

bottom:20px;

display:none;

flex-direction:column;

gap:10px;

z-index:9999;

}



.float-btn{

width:65px;

height:65px;

border:none;

border-radius:50%;

font-weight:bold;

}



.home{

background:#6d0015;

color:white;

}



.peta{

background:#d4af37;

color:white;

}



</style>


</head>




<body>



<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>





<!-- COVER -->

<div id="cover">


<img src="cover.jpg" class="cover-img">



<div class="btn-buka"

onclick="bukaUndangan()">

</div>



<a class="btn-peta"

href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"

target="_blank">

</a>


</div>






<!-- HALAMAN -->

<div id="content">


<div class="book" id="book">


<div class="page">
<img src="halaman1.jpg">
</div>


<div class="page">
<img src="halaman2.jpg">
</div>


<div class="page">
<img src="halaman3.jpg">
</div>


<div class="page">
<img src="halaman4.jpg">
</div>


<div class="page">
<img src="halaman5.jpg">
</div>


<div class="page">
<img src="halaman6.jpg">
</div>



</div>


</div>








<!-- FLOAT -->


<div class="floating">



<button class="float-btn peta"

onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">

PETA

</button>




<button class="float-btn home"

onclick="kembaliHome()">

HOME

</button>


</div>








<script>


const musik =
document.getElementById("musik");


let halaman=0;

let lock=false;





function bukaUndangan(){


document.getElementById("cover").style.display="none";


document.getElementById("content").style.display="block";


document.querySelector(".floating").style.display="flex";


musik.play().catch(()=>{});


}







function nextPage(){


if(lock) return;



if(halaman < 5){


halaman++;


geser();


}



lock=true;


setTimeout(()=>{

lock=false;

},600);


}






function prevPage(){


if(lock) return;



if(halaman > 0){


halaman--;


geser();


}


lock=true;


setTimeout(()=>{

lock=false;

},600);


}







function geser(){


document.getElementById("book").style.transform =

"translateX(-"+(halaman*100)+"%)";


}









/* SWIPE HP */


let startX=0;


document.getElementById("book")

.addEventListener("touchstart",function(e){


startX=e.touches[0].clientX;


});





document.getElementById("book")

.addEventListener("touchend",function(e){


let endX=e.changedTouches[0].clientX;



if(startX-endX > 50){

nextPage();

}



if(endX-startX > 50){

prevPage();

}



});








/* SCROLL PC */


document.addEventListener("wheel",function(e){


if(document.getElementById("content").style.display!="block")

return;



if(e.deltaY > 0){

nextPage();

}


else{

prevPage();

}



});








function kembaliHome(){


document.getElementById("content").style.display="none";


document.getElementById("cover").style.display="block";


document.querySelector(".floating").style.display="none";



halaman=0;


geser();


}



</script>





</body>

</html>
