<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>


<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

background:#f5f5f5;
overflow:hidden;
font-family:Georgia,serif;

}


/* COVER */

#cover{

position:relative;
width:100%;
max-width:700px;
margin:auto;

}


.cover-img{

width:100%;
display:block;

}


.btn-buka{

position:absolute;
left:22%;
bottom:19%;
width:18%;
height:6%;
cursor:pointer;

}



.btn-peta{

position:absolute;
right:22%;
bottom:19%;
width:18%;
height:6%;
cursor:pointer;

}



/* CONTENT */

#content{

display:none;

width:100%;
max-width:700px;

margin:auto;

overflow:hidden;

background:white;

}



.book{

display:flex;

width:100%;

transition:transform .5s ease;

}



.page{

flex:0 0 100%;

width:100%;

}



.page img{

width:100%;

display:block;

}





/* NAV */

.nav{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

display:none;

z-index:9999;

}



.nav button{

width:55px;
height:55px;

border:none;
border-radius:50%;

background:#6d0015;

color:white;

font-size:30px;

margin:5px;

}




/* FLOAT */


.floating{

position:fixed;

right:15px;

bottom:20px;

display:none;

flex-direction:column;

gap:10px;

z-index:9999;

}



.float-btn{

width:65px;
height:65px;

border:none;
border-radius:50%;

font-weight:bold;

}



.home{

background:#6d0015;
color:white;

}



.peta{

background:#d4af37;
color:white;

}



</style>


</head>



<body>



<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>




<!-- COVER -->

<div id="cover">


<img src="cover.jpg" class="cover-img">


<div class="btn-buka"
onclick="bukaUndangan()">
</div>



<a class="btn-peta"
href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"
target="_blank">

</a>


</div>






<!-- ISI -->

<div id="content">


<div class="book" id="book">



<div class="page">
<img src="halaman1.jpg">
</div>


<div class="page">
<img src="halaman2.jpg">
</div>


<div class="page">
<img src="halaman3.jpg">
</div>


<div class="page">
<img src="halaman4.jpg">
</div>


<div class="page">
<img src="halaman5.jpg">
</div>


<div class="page">
<img src="halaman6.jpg">
</div>



</div>


</div>






<!-- tombol halaman -->

<div class="nav" id="nav">


<button onclick="prevPage()">
‹
</button>


<button onclick="nextPage()">
›
</button>


</div>






<div class="floating">


<button class="float-btn peta"

onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">

PETA

</button>




<button class="float-btn home"

onclick="kembaliHome()">

HOME

</button>


</div>







<script>


const musik =
document.getElementById("musik");


let halaman=0;



function bukaUndangan(){


document.getElementById("cover").style.display="none";


document.getElementById("content").style.display="block";


document.querySelector(".floating").style.display="flex";


document.getElementById("nav").style.display="block";



musik.play().catch(()=>{});



}



function nextPage(){


if(halaman < 5){


halaman++;


document.getElementById("book").style.transform =

"translateX(-"+(halaman*100)+"%)";


}


}





function prevPage(){


if(halaman > 0){


halaman--;


document.getElementById("book").style.transform =

"translateX(-"+(halaman*100)+"%)";


}


}





function kembaliHome(){


document.getElementById("content").style.display="none";


document.getElementById("cover").style.display="block";


document.querySelector(".floating").style.display="none";


document.getElementById("nav").style.display="none";



halaman=0;


document.getElementById("book").style.transform="translateX(0)";


}



</script>



</body>
</html>
