<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>


<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">

<meta property="og:image" content="https://revolutionsquad99-commits.github.io/weddinginvitation/thumbnail.png">

<meta property="og:type" content="website">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


html{
scroll-behavior:smooth;
}


body{

background:#f5f5f5;
overflow-x:hidden;
font-family:Georgia,serif;

}



/* COVER */

#cover{

position:relative;
width:100%;
max-width:700px;
margin:auto;

}


.cover-img{

width:100%;
display:block;

}



/* TOMBOL COVER */


.btn-buka{

position:absolute;
left:22%;
bottom:19%;

width:18%;
height:6%;

cursor:pointer;

}



.btn-peta{

position:absolute;
right:22%;
bottom:19%;

width:18%;
height:6%;

cursor:pointer;

}



/* ISI */


#content{

display:none;

max-width:700px;
margin:auto;

background:white;

}



.page{

width:100%;
display:block;

}



/* FLOAT */


.floating{

position:fixed;

right:15px;
bottom:15px;

display:none;

flex-direction:column;

gap:10px;

z-index:9999;

}



.float-btn{

width:70px;
height:70px;

border:none;

border-radius:50%;

font-size:13px;

font-weight:bold;

}



.home{

background:#6d0015;
color:white;

}


.peta{

background:#d4af37;
color:white;

}





/* =====================
   KUPU KUPU
===================== */


.butterfly{

position:fixed;

z-index:9998;

pointer-events:none;

}



/* kecil */

.bf1{

width:60px;

left:-100px;

top:65%;

animation:

flySmall 14s linear infinite;

}



/* sedang */

.bf2{

width:100px;

right:-120px;

top:35%;

animation:

flyMedium 20s linear infinite;

animation-delay:3s;

}



/* besar */

.bf3{

width:150px;

left:-150px;

top:20%;

animation:

flyBig 26s linear infinite;

animation-delay:6s;

}



/* kepak */


@keyframes flap{


0%{

transform:
scaleX(1);

}


100%{

transform:
scaleX(.75);

}

}



/* kecil */

@keyframes flySmall{


0%{

transform:
translate(0,0)
rotate(10deg);

}


25%{

transform:
translate(30vw,-20vh)
rotate(-15deg);

}


50%{

transform:
translate(60vw,10vh)
rotate(10deg);

}


100%{

transform:
translate(120vw,-10vh)
rotate(-10deg);

}

}



/* sedang */


@keyframes flyMedium{


0%{

transform:
translate(0,0)
rotate(-10deg);

}


50%{

transform:
translate(-60vw,25vh)
rotate(15deg);

}


100%{

transform:
translate(-130vw,-20vh)
rotate(-10deg);

}

}



/* besar */


@keyframes flyBig{


0%{

transform:
translate(0,0)
rotate(5deg);

}


50%{

transform:
translate(70vw,35vh)
rotate(-15deg);

}


100%{

transform:
translate(140vw,0)
rotate(10deg);

}

}



/* efek kepak terpisah */

.bf1,
.bf2,
.bf3{

animation-name:
flySmall, flap;

animation-duration:
14s,.35s;

animation-timing-function:
linear,ease-in-out;

animation-iteration-count:
infinite;

animation-direction:
normal,alternate;

}


.bf2{

animation-name:
flyMedium, flap;

animation-duration:
20s,.4s;

}



.bf3{

animation-name:
flyBig, flap;

animation-duration:
26s,.5s;

}



</style>


</head>



<body>



<!-- KUPU KUPU -->

<img src="butterfly1.png" class="butterfly bf1">

<img src="butterfly2.png" class="butterfly bf2">

<img src="butterfly3.png" class="butterfly bf3">





<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>





<div id="cover">


<img src="cover.jpg" class="cover-img">



<div 
class="btn-buka"
onclick="bukaUndangan()">

</div>



<a

class="btn-peta"

href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"

target="_blank">

</a>


</div>






<div id="content">


<img src="halaman1.jpg" class="page">

<img src="halaman2.jpg" class="page">

<img src="halaman3.jpg" class="page">

<img src="halaman4.jpg" class="page">

<img src="halaman5.jpg" class="page">

<img src="halaman6.jpg" class="page">


</div>







<div class="floating">


<button

class="float-btn peta"

onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">

PETA

</button>



<button

class="float-btn home"

onclick="kembaliHome()">

HOME

</button>


</div>







<script>


const musik =
document.getElementById("musik");



function bukaUndangan(){


document.getElementById("cover").style.display="none";


document.getElementById("content").style.display="block";


document.querySelector(".floating").style.display="flex";


musik.play().catch(()=>{});



window.scrollTo({

top:0,

behavior:"smooth"

});

}




function kembaliHome(){


document.getElementById("content").style.display="none";


document.getElementById("cover").style.display="block";


document.querySelector(".floating").style.display="none";


window.scrollTo({

top:0,

behavior:"smooth"

});

}


</script>



</body>

</html>
